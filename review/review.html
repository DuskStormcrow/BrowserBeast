<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline';">
  <title>BrowserBeast Full Review</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #101214;
      color: #f4f7fb;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #101214;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 18px 28px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(16, 18, 20, 0.96);
    }

    h1 {
      margin: 0 0 4px;
      font-size: 20px;
      font-weight: 650;
    }

    .meta {
      color: #aeb8c8;
      font-size: 13px;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 26px 28px 48px;
    }

    .summary-card {
      box-sizing: border-box;
      width: 100%;
      margin: 0 0 18px;
      padding: 18px 20px;
      border: 2px solid #38bdf8;
      border-radius: 6px;
      background: #f8fafc;
      color: #0f172a;
      font: 15px/1.55 Consolas, "Cascadia Mono", "Courier New", monospace;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    pre {
      box-sizing: border-box;
      width: 100%;
      min-height: 70vh;
      margin: 0;
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: #171b20;
      color: #f4f7fb;
      font: 14px/1.55 Consolas, "Cascadia Mono", "Courier New", monospace;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <header>
    <h1 id="reviewTitle">BrowserBeast Full Review</h1>
    <div class="meta" id="reviewMeta">Local review page</div>
  </header>
  <main>
    <section class="summary-card" id="reviewSummary">Loading summary...</section>
    <pre id="reviewContent">Loading review...</pre>
  </main>
  <script src="review.js"></script>
</body>
</html>
